<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>você acorda em uma floresta.</title>
<style>
  :root{
    --bg: #0a0f0c;
    --bg-2: #0e1512;
    --ink: #cdd9d0;
    --ink-dim: #6f8079;
    --danger: #7a2130;
    --danger-glow: #b3435530;
    --line: #223028;
  }
  * { box-sizing: border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    background: radial-gradient(ellipse at 50% 20%, var(--bg-2), var(--bg) 70%);
    color: var(--ink);
    font-family: "Courier New", ui-monospace, "IBM Plex Mono", monospace;
    overflow-x:hidden;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
    pointer-events:none;
    mix-blend-mode: overlay;
  }
  #vignette{
    position:fixed; inset:0; pointer-events:none;
    box-shadow: inset 0 0 160px 40px rgba(0,0,0,0.85);
    transition: box-shadow 0.6s ease;
    z-index: 5;
  }
  .wrap{
    position:relative; z-index:2;
    max-width: 640px;
    margin: 0 auto;
    min-height: 100vh;
    display:flex;
    flex-direction: column;
    justify-content: center;
    padding: 8vh 24px 10vh;
  }
  .eyebrow{
    color: var(--ink-dim);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 28px;
    min-height: 14px;
    opacity: 0.8;
  }
  #story{
    font-size: 19px;
    line-height: 1.85;
    white-space: pre-wrap;
    min-height: 180px;
    letter-spacing: 0.01em;
  }
  #story .cursor{
    display:inline-block;
    width: 9px; height: 1.1em;
    background: var(--ink);
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 0.9s steps(1) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }
  #choices{
    margin-top: 44px;
    display:flex;
    flex-direction: column;
    gap: 14px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  #choices.show{ opacity: 1; }
  .choice{
    background:none;
    border:none;
    border-left: 2px solid var(--line);
    color: var(--ink);
    font-family: inherit;
    font-size: 16px;
    text-align:left;
    padding: 8px 0 8px 18px;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: border-color 0.25s ease, color 0.25s ease, padding-left 0.25s ease, opacity 0.25s ease;
  }
  .choice:hover, .choice:focus-visible{
    border-color: var(--danger);
    color: #fff;
    padding-left: 26px;
    outline: none;
  }
  .choice::before{ content: "› "; color: var(--ink-dim); }
  .choice.disabled{
    opacity: 0.32;
    filter: grayscale(1);
    cursor: not-allowed;
    pointer-events: none;
  }
  #restart{
    display:none;
    margin-top: 44px;
    background:none;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 18px;
    cursor: pointer;
    align-self:flex-start;
    transition: all 0.25s ease;
  }
  #restart:hover{ color: var(--ink); border-color: var(--ink-dim); }
  #restart.show{ display:inline-block; }
  #title-screen{
    position:fixed; inset:0; z-index: 10;
    background: var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap: 32px;
    transition: opacity 0.9s ease;
  }
  #title-screen h1{
    font-weight: 400;
    font-size: clamp(22px, 4vw, 30px);
    color: var(--ink);
    letter-spacing: 0.02em;
    text-align:center;
    max-width: 500px;
    line-height: 1.5;
  }
  #title-screen .sub{
    color: var(--ink-dim);
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  #start-btn{
    background:none;
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 12px 28px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  #start-btn:hover{ border-color: var(--danger); background: var(--danger-glow); }
  .hidden{ display:none !important; }
</style>
</head>

// anúncios de pontos de interesse nas imediações
const OPENING_MSGS = {
  norte: ["Ao norte, você vê uma abertura entre as árvores.", "Mais para o norte, a claridade muda — como se a mata se abrisse ali.", "Ao norte, os troncos parecem se afastar, deixando um vão maior."],
  sul:   ["Ao sul, você vê uma abertura entre as árvores.", "Mais para o sul, a claridade muda — como se a mata se abrisse ali.", "Ao sul, os troncos parecem se afastar, deixando um vão maior."],

};

};

  floresta: ["Mais floresta.", "Você vê mais floresta ao seu redor.", "Troncos e mais troncos, sem fim aparente."],
  caminho: ["Você encontra um caminho estreito entre as árvores.", "O chão aqui é mais firme — parece um caminho.", "Uma trilha discreta corta a vegetação."],

  exploreClareira: ["Nada além de grama pisada e silêncio.", "O vento cruza a clareira sem obstáculos.", "Você não encontra nada de útil aqui."]
};

  "Algo se move entre os troncos, rápido demais para ver. A última coisa que você sente é o frio.\n\nFIM.",

// ================== ESTADO DO JOGO ==================
let state = null;

function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function manhattan(x1,y1,x2,y2){ return Math.abs(x1-x2)+Math.abs(y1-y2); }
function cellKey(x,y){ return x+","+y; }

function generateWater(start, exit){
  const blocked = new Set();

  let placedLakes = 0, attempts = 0;
  while(placedLakes < LAKE_COUNT && attempts < 150){
    attempts++;
    const x = randInt(0, GRID_SIZE-1), y = randInt(0, GRID_SIZE-1);
    const k = cellKey(x,y);
    if((x===start.x && y===start.y) || (x===exit.x && y===exit.y) || blocked.has(k)) continue;
    blocked.add(k);
    placedLakes++;
  }

  let placedRivers = 0;
  attempts = 0;
  while(placedRivers < RIVER_COUNT && attempts < 200){
    attempts++;
    const vertical = Math.random() < 0.5;
    const length = randInt(3,5);
    const cells = [];
    let overlapsKey = false;
    if(vertical){
      const col = randInt(0, GRID_SIZE-1);
      const startRow = randInt(0, GRID_SIZE-length);
      for(let r=0;r<length;r++){
        const yy = startRow+r;
        if((col===start.x && yy===start.y) || (col===exit.x && yy===exit.y)){ overlapsKey = true; break; }
        cells.push(cellKey(col,yy));
      }
    } else {
      const row = randInt(0, GRID_SIZE-1);
      const startCol = randInt(0, GRID_SIZE-length);
      for(let c=0;c<length;c++){
        const xx = startCol+c;
        if((xx===start.x && row===start.y) || (xx===exit.x && row===exit.y)){ overlapsKey = true; break; }
        cells.push(cellKey(xx,row));
      }
    }
    if(!overlapsKey){
      cells.forEach(c => blocked.add(c));
      placedRivers++;
    }
  }

  return blocked;
}

function isReachable(start, exit, blocked){
  const visited = new Set([cellKey(start.x,start.y)]);
  const queue = [start];
  while(queue.length){
    const cur = queue.shift();
    if(cur.x === exit.x && cur.y === exit.y) return true;
    [[0,-1],[0,1],[1,0],[-1,0]].forEach(([dx,dy]) => {
      const nx = cur.x+dx, ny = cur.y+dy;
      if(nx<0||nx>=GRID_SIZE||ny<0||ny>=GRID_SIZE) return;
      const k = cellKey(nx,ny);
      if(blocked.has(k) || visited.has(k)) return;
      visited.add(k);
      queue.push({x:nx, y:ny});
    });
  }
  return false;
}

function initGame(){
  const start = { x: 3, y: 3 };
  let exit;
  do {
    exit = { x: randInt(0, GRID_SIZE-1), y: randInt(0, GRID_SIZE-1) };
  } while(
    (exit.x === start.x && exit.y === start.y) ||
    manhattan(exit.x, exit.y, start.x, start.y) < 4 ||
    manhattan(exit.x, exit.y, start.x, start.y) > 8
  );

  let blocked = new Set();
  let tries = 0;
  do {
    blocked = generateWater(start, exit);
    tries++;
  } while(!isReachable(start, exit, blocked) && tries < 60);
  if(!isReachable(start, exit, blocked)) blocked = new Set();

  const cellTypes = {};
  for(let x=0;x<GRID_SIZE;x++){
    for(let y=0;y<GRID_SIZE;y++){
      const k = cellKey(x,y);
      if(blocked.has(k)){ cellTypes[k] = "agua"; continue; }
      if(x === start.x && y === start.y){ cellTypes[k] = "floresta"; continue; }
      if(x === exit.x && y === exit.y){ cellTypes[k] = "caminho"; continue; }
      const r = Math.random();
      cellTypes[k] = r < 0.15 ? "clareira" : (r < 0.35 ? "caminho" : "floresta");
    }
  }

  state = {
    x: start.x, y: start.y,
    exit,
    cellTypes,
    hourIndex: 0,
    actionCount: 0,
    actionsSinceStage: 0,
    stageThreshold: randInt(4,6),
    climbed: false,
    firstActionTaken: false,
    event: choice(EVENTS),
    eventTimeIndex: 0,
    lastDir: null,
    blockedDirs: new Set(),
    knownPOIDirs: new Set(),
    groundLookUsed: false,
    climbLookUsed: false
  };
}

function getCellType(x,y){ return state.cellTypes[cellKey(x,y)] || "floresta"; }
function currentType(){ return state.climbed ? "topo" : getCellType(state.x, state.y); }

function bestDirection(){
  const dx = state.exit.x - state.x;
  const dy = state.exit.y - state.y;
  const options = [];
  if(dx > 0) options.push("leste");
  if(dx < 0) options.push("oeste");
  if(dy > 0) options.push("sul");
  if(dy < 0) options.push("norte");
  if(options.length === 0) return choice(["norte","sul","leste","oeste"]);
  return choice(options);
}

function getPOICandidates(excludeDirs){
  const candidates = [];
  ["norte","sul","leste","oeste"].forEach(dir => {
    if(excludeDirs && excludeDirs.has(dir)) return;
    const d = DIRS[dir];
    const nx = state.x + d.dx, ny = state.y + d.dy;
    if(nx<0||nx>=GRID_SIZE||ny<0||ny>=GRID_SIZE) return;
    const t = getCellType(nx, ny);
    if(t === "agua") return;
    const isExit = (nx === state.exit.x && ny === state.exit.y);
    if(isExit || t === "clareira"){
      candidates.push({ dir, kind: "opening" });
    } else if(t === "caminho"){
      candidates.push({ dir, kind: "path" });
    }
  });
  return candidates;
}

function poiMessage(kind, dir){
  const pool = kind === "opening" ? OPENING_MSGS[dir] : PATH_MSGS[dir];
  return choice(pool);
}

function getWaterNeighbors(){
  const dirs = [];
  ["norte","sul","leste","oeste"].forEach(dir => {
    const d = DIRS[dir];
    const nx = state.x + d.dx, ny = state.y + d.dy;
    if(nx<0||nx>=GRID_SIZE||ny<0||ny>=GRID_SIZE) return;
    if(getCellType(nx,ny) === "agua") dirs.push(dir);
  });
  return dirs;
}

function availableActions(){
  const actions = [];
  if(!state.climbed){
    ["norte","sul","leste","oeste"].forEach(dir => {
      const label = (state.lastDir === dir)
        ? ("Continuar seguindo para o " + DIR_WORDS[dir])
        : ("Seguir para o " + DIR_WORDS[dir]);
      actions.push({ label, type: "move", dir, disabled: state.blockedDirs.has(dir) });
    });
    const type = getCellType(state.x, state.y);
    if(type !== "clareira"){
      actions.push({ label: "Olhar ao redor", type: "look", disabled: state.groundLookUsed });
      actions.push({ label: "Subir em uma árvore", type: "climb" });
    } else {
      actions.push({ label: "Explorar a clareira", type: "explore", disabled: state.groundLookUsed });
    }
    if(state.x === state.exit.x && state.y === state.exit.y){
      actions.push({ label: "Sair da floresta", type: "exit" });
    }
  } else {
    actions.push({ label: "Olhar ao redor (do alto)", type: "look", disabled: state.climbLookUsed });
    actions.push({ label: "Descer da árvore", type: "descend" });
  }
  return actions;
}

function processAction(action){
  if(action.type === "exit"){
    finishGame();
    return;
  }

  const wasOnPath = (!state.climbed && getCellType(state.x, state.y) === "caminho");
  let lines = [];

  if(action.type === "move"){
    const d = DIRS[action.dir];
    const nx = state.x + d.dx, ny = state.y + d.dy;
    const outOfBounds = nx<0||nx>=GRID_SIZE||ny<0||ny>=GRID_SIZE;
    const isWater = !outOfBounds && getCellType(nx,ny) === "agua";
    if(outOfBounds || isWater){
      lines.push(isWater ? choice(FLAVOR.water) : choice(FLAVOR.bump));
      state.blockedDirs.add(action.dir);
    } else {
      state.x = nx; state.y = ny;
      state.blockedDirs = new Set();
      state.lastDir = action.dir;
      state.knownPOIDirs = new Set();
      state.groundLookUsed = false;
      lines.push(choice(FLAVOR[getCellType(nx, ny)]));
      const cameFrom = OPPOSITE_DIR[action.dir];
      const candidates = getPOICandidates(new Set([cameFrom]));
      if(candidates.length > 0){
        const pick = choice(candidates);
        state.knownPOIDirs.add(pick.dir);
        lines.push(poiMessage(pick.kind, pick.dir));
      }
    }
  } else if(action.type === "look"){
    const cameFrom = state.lastDir ? OPPOSITE_DIR[state.lastDir] : null;
    const excludeBase = cameFrom ? new Set([cameFrom]) : new Set();
    const exclude = new Set(state.knownPOIDirs);
    if(cameFrom) exclude.add(cameFrom);
    const newOnes = getPOICandidates(exclude);
    newOnes.forEach(c => {
      state.knownPOIDirs.add(c.dir);
      lines.push(poiMessage(c.kind, c.dir));
    });

    const anyPOINearby = getPOICandidates(excludeBase).length > 0;

    const clueChance = state.climbed ? CLIMB_CLUE_CHANCE : LOOK_CLUE_CHANCE;
    let clueFound = false;
    if(Math.random() < clueChance){
      const dir = bestDirection();
      const pool = state.climbed ? TREETOP_CLUES[state.hourIndex][dir] : GROUND_CLUES[state.hourIndex][dir];
      lines.push(choice(pool));
      clueFound = true;
    }

    if(!clueFound && !anyPOINearby){
      lines.push(state.climbed ? choice(FLAVOR.topo) : choice(FLAVOR[getCellType(state.x, state.y)]));
    }
    if(lines.length === 0){
      lines.push("Nada muda por enquanto.");
    }

    if(state.climbed){ state.climbLookUsed = true; } else { state.groundLookUsed = true; }
  } else if(action.type === "climb"){
    state.climbed = true;
    state.climbLookUsed = false;
    lines.push("Você sobe em uma árvore alta.");
    if(Math.random() < CLIMB_INSTANT_CLUE_CHANCE){
      const dir = bestDirection();
      lines.push(choice(TREETOP_CLUES[state.hourIndex][dir]));
    } else {
      lines.push(choice(FLAVOR.topo));
    }
    getWaterNeighbors().forEach(dir => {
      lines.push(choice(WATER_WARNING_MSGS[dir]));
    });
  } else if(action.type === "descend"){
    state.climbed = false;
    lines.push("Você desce da árvore.");
  } else if(action.type === "explore"){
    if(Math.random() < EXPLORE_CLUE_CHANCE){
      const dir = bestDirection();
      lines.push(choice(GROUND_CLUES[state.hourIndex][dir]));
    } else {
      lines.push(choice(FLAVOR.exploreClareira));
    }
    state.groundLookUsed = true;
  }

  const freeAction = wasOnPath;
  if(!freeAction){
    state.actionCount++;
    state.actionsSinceStage++;
  }

  if(!state.firstActionTaken){
    state.firstActionTaken = true;
    lines.push(state.event.initial);
  }

  if(!freeAction && state.actionsSinceStage >= state.stageThreshold && state.hourIndex < 3){
    state.hourIndex++;
    state.actionsSinceStage = 0;
    state.stageThreshold = randInt(4,6);
    lines.push(HOUR_TRANSITION_MSG[state.hourIndex]);
    if(state.eventTimeIndex < state.event.timeMessages.length){
      lines.push(state.event.timeMessages[state.eventTimeIndex]);
      state.eventTimeIndex++;
    }
  }

  const type = currentType();
  const prob = RISK_TABLE[type][state.hourIndex];
  if(prob > 0 && Math.random() < prob){
    renderEnding(lines.concat([choice(DEATH_TEXTS)]), true);
    return;
  }

  renderScene(lines, prob > 0);
}

function finishGame(){
  let wrap, eventMsg;
  if(state.actionCount <= 6){
    wrap = "Você sai da floresta antes que a escuridão tome conta de tudo. Atrás de você, os troncos voltam a ficar imóveis, como se nada tivesse acontecido.";
    eventMsg = state.event.early;
  } else if(state.actionCount <= 12){
    wrap = "Você sai da floresta, mas o dia já foi longe demais. Atrás de você, a floresta permanece em silêncio — um silêncio que parece satisfeito.";
    eventMsg = state.event.moderate;
  } else {
    wrap = "Você finalmente sai da floresta. Está vivo — isso é mais do que muitos podem dizer. Mas o mundo lá fora seguiu sem esperar por você.";
    eventMsg = choice(state.event.late);
  }
  renderEnding([wrap, eventMsg], false);
}

// ================== ÁUDIO ==================
let audioCtx = null;
function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}
function typeBeep(danger){
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "sine";
  osc.frequency.value = danger ? 180 + Math.random()*30 : 320 + Math.random()*40;
  gain.gain.value = 0.035;
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.045);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.05);
}

// ================== RENDERIZAÇÃO ==================
const storyEl = document.getElementById("story");
const choicesEl = document.getElementById("choices");
const eyebrowEl = document.getElementById("eyebrow");
const restartBtn = document.getElementById("restart");
let typing = false;

function typeText(text, danger, onDone){
  typing = true;
  storyEl.textContent = "";
  const cursor = document.createElement("span");
  cursor.className = "cursor";
  let i = 0;
  function step(){
    if(i < text.length){
      storyEl.textContent = text.slice(0, i+1);
      storyEl.appendChild(cursor);
      const ch = text[i];
      if(ch.trim() !== "") typeBeep(danger);
      i++;
      const delay = (ch === "." || ch === "\n") ? 90 : 18 + Math.random()*14;
      setTimeout(step, delay);
    } else {
      cursor.remove();
      typing = false;
      onDone();
    }
  }
  step();
}

function renderChoiceButtons(){
  choicesEl.innerHTML = "";
  availableActions().forEach(a => {
    const btn = document.createElement("button");
    btn.className = "choice" + (a.disabled ? " disabled" : "");
    btn.textContent = a.label;
    if(a.disabled){
      btn.disabled = true;
    } else {
      btn.onclick = () => processAction(a);
    }
    choicesEl.appendChild(btn);
  });
  choicesEl.classList.add("show");
}

function renderScene(lines, dangerAudio){
  choicesEl.classList.remove("show");
  choicesEl.innerHTML = "";
  restartBtn.classList.remove("show");
  eyebrowEl.textContent = "· " + String(state.actionCount).padStart(2,"0");
  const text = lines.filter(Boolean).join("\n\n");
  typeText(text, !!dangerAudio, renderChoiceButtons);
}

function renderEnding(lines, dangerAudio){
  choicesEl.classList.remove("show");
  choicesEl.innerHTML = "";
  eyebrowEl.textContent = "";
  const text = lines.filter(Boolean).join("\n\n");
  typeText(text, !!dangerAudio, () => {
    restartBtn.classList.add("show");
  });
}

function startGame(){
  initGame();
  choicesEl.classList.remove("show");
  choicesEl.innerHTML = "";
  restartBtn.classList.remove("show");
  eyebrowEl.textContent = "";
  typeText("Você acorda em uma floresta.", false, renderChoiceButtons);
}

document.getElementById("start-btn").addEventListener("click", () => {
  initAudio();
  document.getElementById("title-screen").style.opacity = "0";
  setTimeout(() => document.getElementById("title-screen").classList.add("hidden"), 900);
  startGame();
});

restartBtn.addEventListener("click", () => {
  startGame();
});
</script>
